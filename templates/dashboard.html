<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPMS Dashboard</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="dashboard">
      <h1>Dashboard</h1>
      <p>Welcome, <strong>{{ username }}</strong>!</p>
      <p>Email: {{ user_email }}</p>
      <p>Role: <span class="role-badge">{{ role }}</span></p>
      <p>The Flask scaffold is ready. You can now migrate your SPMS features here.</p>
      <a class="button" href="/logout">Logout</a>
      <a class="button button-secondary" href="/">Back to home</a>
    </div>
  </div>
</body>
</html>
