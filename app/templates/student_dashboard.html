{% extends "base.html" %}

{% block title %}Student Dashboard - SPMS{% endblock %}

{% block content %}
<h1>Student Dashboard</h1>
<p>Welcome, {{ username }}!</p>

<div class="dashboard-grid">
    <a href="{{ url_for('main.student_profile') }}" class="dashboard-card">
        <h3>👤 My Profile</h3>
        <p>View your academic information and details</p>
    </a>
    <a href="{{ url_for('main.student_results') }}" class="dashboard-card">
        <h3>📊 Results</h3>
        <p>Check your exam results and grades</p>
    </a>
    <a href="{{ url_for('main.index') }}" class="dashboard-card">
        <h3>❓ Help</h3>
        <p>Get help and support</p>
    </a>
</div>

<style>
    .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin: 30px 0;
    }
    
    .dashboard-card {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: var(--shadow);
        text-decoration: none;
        color: inherit;
        transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .dashboard-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }
    
    .dashboard-card h3 {
        color: var(--accent);
        margin-bottom: 10px;
    }
</style>
{% endblock %}
