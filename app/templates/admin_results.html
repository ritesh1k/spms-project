{% extends "base.html" %}

{% block title %}Manage Results - SPMS{% endblock %}

{% block content %}
<h1>Manage Results</h1>

<div class="results-form-container">
    <div class="form-card">
        <h2>Publish Final Result</h2>
        
        <form id="publishResultForm" class="publish-result-form">
            <div class="form-group">
                <label for="enrollment">Student Enrollment Number</label>
                <input type="text" id="enrollment" name="enrollment_no" required placeholder="e.g., CS2021001">
            </div>
            
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required placeholder="e.g., Data Structures">
            </div>
            
            <div class="form-group">
                <label for="semester">Semester</label>
                <select id="semester" name="semester" required>
                    <option value="">-- Select Semester --</option>
                    <option value="I">I</option>
                    <option value="II">II</option>
                    <option value="III">III</option>
                    <option value="IV">IV</option>
                    <option value="V">V</option>
                    <option value="VI">VI</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="external">External Marks <span class="max">(Max: 60)</span></label>
                <input type="number" id="external" name="external_marks" min="0" max="60" step="0.5" required placeholder="0-60">
            </div>
            
            <div class="info-box">
                <p><strong>Note:</strong> Final marks = Internal marks (40) + External marks (60) = Total 100</p>
            </div>
            
            <button type="submit" class="btn btn-primary">Publish Result</button>
        </form>
    </div>
</div>

<div class="action-buttons">
    <a href="{{ url_for('main.admin_dashboard') }}" class="btn btn-secondary">Back</a>
</div>

<style>
    .results-form-container {
        margin: 20px 0;
    }
    
    .form-card {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: var(--shadow);
        max-width: 500px;
    }
    
    .form-card h2 {
        color: var(--accent);
        margin-bottom: 20px;
    }
    
    .publish-result-form {
        margin: 0;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
    }
    
    .form-group .max {
        font-size: 0.85em;
        color: #666;
        font-weight: normal;
    }
    
    .form-group input,
    .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 1em;
        font-family: inherit;
    }
    
    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(79, 86, 255, 0.1);
    }
    
    .info-box {
        background: #e7f3ff;
        border-left: 4px solid var(--accent);
        padding: 15px;
        margin: 20px 0;
        border-radius: 4px;
        color: #333;
    }
    
    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 4px;
        font-size: 1em;
        cursor: pointer;
        transition: background-color 0.3s;
        text-decoration: none;
        text-align: center;
        display: inline-block;
    }
    
    .btn-primary {
        background-color: var(--accent);
        color: white;
    }
    
    .btn-primary:hover {
        background-color: #3f46e0;
    }
    
    .action-buttons {
        display: flex;
        justify-content: center;
        margin-top: 20px;
    }
    
    .btn-secondary {
        background-color: #6c757d;
        color: white;
        padding: 10px 20px;
        width: auto;
    }
</style>

<script>
    document.getElementById('publishResultForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(this);
        const data = Object.fromEntries(formData);
        
        try {
            const response = await fetch('{{ url_for("main.api_publish_result") }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (result.success) {
                alert(`Result published successfully!\nGrade: ${result.grade}\nTotal: ${result.final_total}`);
                this.reset();
            } else {
                alert('Error: ' + result.error);
            }
        } catch (error) {
            alert('Error publishing result: ' + error.message);
        }
    });
</script>
{% endblock %}
