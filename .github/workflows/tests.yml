name: Tests & Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_password
          MYSQL_DATABASE: spms_db
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pylint flake8
    
    - name: Wait for MySQL
      run: |
        for i in {1..30}; do
          mysql -h 127.0.0.1 -u root -ptest_root_password -e "SELECT 1" && break || sleep 1
        done
    
    - name: Run linting
      run: |
        flake8 app/ database/ --count --statistics --max-line-length=100 || true
        pylint app/ database/ --disable=all --enable=E,F || true
    
    - name: Run tests
      env:
        MYSQL_HOST: 127.0.0.1
        MYSQL_USER: root
        MYSQL_PASSWORD: test_root_password
        MYSQL_DB: spms_db
        MYSQL_PORT: 3306
        SECRET_KEY: test-secret-key
      run: |
        pytest tests/ -v --cov=app --cov=database --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
